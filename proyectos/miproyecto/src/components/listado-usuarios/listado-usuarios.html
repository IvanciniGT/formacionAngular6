
<h2> Listado de todos los usuarios</h2>

@if(this.errorAlCargarLosDatosDeLosUsuarios()){
    <p>Ha habido un error al cargar los datos de los usuarios</p>
}@else{
    @if(this.listadoUsuarios(); as datosRecibidos){
        @for(usuario of datosRecibidos; track usuario.id){
            <app-usuario [usuario]="usuario" mode="extended" [extensible]="true"></app-usuario>
        }
    }@else{
        <p> Cargando los usuarios</p>
    }
}
